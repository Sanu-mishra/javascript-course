<!doctype html>
<html>
<head>
	<title>functions-dom</title>
</head>
<body>
	<script>

		function add(x, y){
			console.log("addition: "+ (x+y));
		}

		add(20, 13);

		//anonymous function...

		let msg = function(){
			console.log("hello advanced js");
		}

		msg();

		//short function for arrow function;

		msg1 = ()=>{console.log("hello function in arrow...")};
		msg1();

		//arrow function using multiline...

		let add1=(a, b)=>{console.log("addition of two numbers is: "+ (a+b))};
		add1(4,5);

	</script>
</body>
</html>
